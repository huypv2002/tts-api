<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>TTS Control · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/admin/styles.css?v=5" />
  <style>
    /* Critical fallback if CSS fails or cached bad */
    html, body { margin: 0; min-height: 100%; background: #070a12; color: #eef3ff; font-family: system-ui, sans-serif; }
    #login-view { min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; }
    #login-view .login-card {
      width: min(420px, 100%);
      background: #121a2b;
      border: 1px solid rgba(140,170,220,0.25);
      border-radius: 16px;
      padding: 1.75rem;
    }
    #login-view input, #login-view button { width: 100%; padding: 0.7rem; margin: 0.35rem 0; box-sizing: border-box; }
    #login-view button { background: #6b8cff; color: #fff; border: 0; border-radius: 10px; font-weight: 700; cursor: pointer; }
    #app-view[hidden], #login-view[hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <div id="login-view">
    <form class="login-card glass" id="login-form">
      <div class="login-logo">
        <div class="logo-mark">T</div>
        <div>
          <div class="logo-title">TTS Control</div>
          <div class="logo-sub">Admin console</div>
        </div>
      </div>
      <p class="login-desc">Keys · proxies · quota · usage</p>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Password" required />
      </div>
      <button class="primary btn-block" type="submit">Sign in</button>
      <div class="error" id="login-error"></div>
      <p id="boot-hint" style="color:#8b9bb8;font-size:0.85rem;margin-top:0.75rem">Loading…</p>
    </form>
  </div>

  <div id="app-view" hidden>
    <div class="shell">
      <aside class="sidebar glass">
        <div class="brand">
          <div class="logo-mark sm">T</div>
          <div>
            <div class="brand-name">TTS Control</div>
            <div class="brand-tag">multi-tenant</div>
          </div>
        </div>
        <nav class="nav">
          <button type="button" class="nav-btn active" data-page="overview"><span class="nav-ico">◈</span> Overview</button>
          <button type="button" class="nav-btn" data-page="keys"><span class="nav-ico">🔑</span> Accounts</button>
          <button type="button" class="nav-btn" data-page="proxies"><span class="nav-ico">⇄</span> Proxies</button>
          <button type="button" class="nav-btn" data-page="settings"><span class="nav-ico">⚙</span> Settings</button>
          <button type="button" class="nav-btn" data-page="jobs"><span class="nav-ico">▤</span> Jobs</button>
          <button type="button" class="nav-btn" data-page="usage"><span class="nav-ico">◔</span> Usage</button>
        </nav>
        <div class="sidebar-foot">
          <div class="pill live" id="live-pill">● live</div>
          <button type="button" class="nav-btn logout" id="btn-logout">Logout</button>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="page-title">Overview</h2>
            <p class="muted" id="page-sub">Realtime ops for your TTS fleet</p>
          </div>
          <div class="top-actions">
            <a class="chip" href="/v1/health" target="_blank" rel="noopener">/v1/health</a>
            <button type="button" class="ghost" id="btn-refresh">Refresh</button>
          </div>
        </header>
        <div id="content"></div>
      </main>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    // Guaranteed show/hide — do NOT rely on class .hidden alone
    window.__ttsShowLogin = function () {
      var login = document.getElementById("login-view");
      var app = document.getElementById("app-view");
      if (login) { login.hidden = false; login.style.display = "grid"; login.classList.remove("hidden"); }
      if (app) { app.hidden = true; app.style.display = "none"; app.classList.add("hidden"); }
    };
    window.__ttsShowApp = function () {
      var login = document.getElementById("login-view");
      var app = document.getElementById("app-view");
      if (login) { login.hidden = true; login.style.display = "none"; login.classList.add("hidden"); }
      if (app) { app.hidden = false; app.style.display = "block"; app.classList.remove("hidden"); }
    };
    // Always show login first paint
    window.__ttsShowLogin();
    // If main app.js fails, at least clear loading hint
    setTimeout(function () {
      var h = document.getElementById("boot-hint");
      if (h) h.textContent = "Enter admin password to continue";
    }, 800);
  </script>
  <script src="/static/admin/app.js?v=7"></script>
</body>
</html>
