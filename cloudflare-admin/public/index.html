<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>TTS Control · Admin (D1)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- v6 cache-bust; critical layout also inlined below so UI never renders "bare" -->
  <link rel="stylesheet" href="/admin/static/admin.v6.css?v=11" />
  <style id="critical-admin">
    :root {
      --bg0: #070a12; --bg1: #0c1220; --panel: rgba(18,24,40,.72); --panel-solid: #121a2b;
      --panel2: #1a2438; --border: rgba(120,140,180,.18); --text: #eef3ff; --muted: #8b9bb8;
      --accent: #6b8cff; --accent2: #3ee0c8; --ok: #3edc9c; --danger: #ff6b8a; --warn: #f5c542;
      --radius: 16px; --radius-sm: 10px;
      --font: "DM Sans", system-ui, -apple-system, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%; background: var(--bg0); color: var(--text);
      font-family: var(--font); -webkit-font-smoothing: antialiased;
    }
    body { overflow-x: hidden; }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; }
    .muted { color: var(--muted); }
    .error { color: var(--danger); font-size: .9rem; min-height: 1.2em; margin-top: .35rem; }
    .mono { font-family: var(--mono); font-size: .85rem; }

    /* Login */
    #login-view { min-height: 100vh; display: grid; place-items: center; padding: 1.5rem; position: relative; z-index: 2; }
    #login-view .login-card {
      width: min(420px, 100%); background: var(--panel-solid);
      border: 1px solid rgba(140,170,220,.25); border-radius: 16px; padding: 1.75rem;
    }
    #login-view input, #login-view button { width: 100%; padding: .7rem; margin: .35rem 0; box-sizing: border-box; border-radius: 10px; border: 1px solid var(--border); background: #0c1220; }
    #login-view button, .primary {
      background: var(--accent); color: #fff; border: 0; border-radius: 10px; font-weight: 700; cursor: pointer;
    }
    .primary { padding: .65rem 1rem; }
    .btn-block { width: 100%; }
    .ghost {
      background: rgba(255,255,255,.03); border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; padding: .55rem .9rem;
    }
    .field label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: .25rem; font-weight: 600; }
    .login-logo { display: flex; gap: .85rem; align-items: center; }
    .logo-mark {
      width: 44px; height: 44px; border-radius: 14px; display: grid; place-items: center;
      font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #061018;
    }
    .logo-mark.sm { width: 36px; height: 36px; font-size: 1rem; border-radius: 11px; }
    .logo-title { font-weight: 700; font-size: 1.2rem; }
    .logo-sub, .login-desc { color: var(--muted); font-size: .85rem; }
    .login-desc { margin: .85rem 0 1.25rem; }

    /* Shell layout — critical */
    #app-view { position: relative; z-index: 1; min-height: 100vh; }
    #app-view[hidden], #login-view[hidden], .hidden { display: none !important; }
    .shell {
      display: grid !important;
      grid-template-columns: 260px minmax(0, 1fr) !important;
      min-height: 100vh;
      width: 100%;
    }
    .sidebar {
      margin: 1rem 0 1rem 1rem; border-radius: 22px; padding: 1.15rem .9rem;
      display: flex; flex-direction: column; gap: .35rem;
      position: sticky; top: 1rem; height: calc(100vh - 2rem);
      background: rgba(18, 24, 40, 0.85);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .brand { display: flex; align-items: center; gap: .75rem; padding: .4rem .55rem 1rem; }
    .brand-name { font-weight: 700; }
    .brand-tag { font-size: .75rem; color: var(--muted); }
    .nav { display: flex; flex-direction: column; gap: .25rem; flex: 1; }
    .nav-btn {
      display: flex; align-items: center; gap: .65rem; text-align: left;
      background: transparent; border: 1px solid transparent; color: var(--muted);
      padding: .72rem .85rem; border-radius: 12px; width: 100%;
    }
    .nav-btn:hover { background: rgba(255,255,255,.04); color: var(--text); }
    .nav-btn.active {
      background: linear-gradient(90deg, rgba(107,140,255,.18), rgba(62,224,200,.08));
      border-color: rgba(107,140,255,.28); color: var(--text);
      box-shadow: inset 3px 0 0 var(--accent2);
    }
    .nav-ico { width: 1.2rem; text-align: center; }
    .sidebar-foot { display: flex; flex-direction: column; gap: .5rem; padding-top: .75rem; border-top: 1px solid var(--border); }
    .pill {
      font-size: .75rem; font-weight: 600; padding: .35rem .65rem; border-radius: 999px;
      width: fit-content; border: 1px solid var(--border); color: var(--muted);
    }
    .pill.live { color: var(--ok); border-color: rgba(62,220,156,.35); background: rgba(62,220,156,.08); }
    .main { padding: 1.35rem 1.6rem 3rem; min-width: 0; width: 100%; }
    .topbar {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 1rem; flex-wrap: wrap; margin-bottom: 1.25rem;
    }
    .topbar h2 { margin: 0; font-size: 1.55rem; font-weight: 700; }
    .topbar .muted { margin: .25rem 0 0; }
    .top-actions { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
    .chip {
      font-size: .78rem; padding: .4rem .7rem; border-radius: 999px;
      border: 1px solid var(--border); background: rgba(255,255,255,.03); color: var(--muted);
    }

    /* Content */
    .cards {
      display: grid !important;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: .85rem; margin-bottom: 1.15rem;
    }
    .card {
      background: linear-gradient(160deg, rgba(26,36,56,.9), rgba(14,20,34,.9));
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.05rem 1.1rem; position: relative; overflow: hidden;
    }
    .card .k { color: var(--muted); font-size: .72rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    .card .v { font-size: 1.55rem; font-weight: 700; margin-top: .35rem; }
    .card .v.ok { color: var(--ok); }
    .card .hint { margin-top: .25rem; font-size: .78rem; color: var(--muted); }
    .panel {
      background: linear-gradient(180deg, rgba(18,26,43,.92), rgba(12,18,32,.92));
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.15rem 1.25rem 1.25rem; margin-bottom: 1.1rem;
    }
    .panel h3 { margin: 0 0 1rem; font-size: 1.02rem; font-weight: 700; }
    .row { display: flex; gap: .55rem; flex-wrap: wrap; align-items: center; margin-bottom: .75rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
    table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: .9rem; display: table; }
    thead { display: table-header-group; }
    tbody { display: table-row-group; }
    tr { display: table-row; }
    th, td { display: table-cell; text-align: left; padding: .7rem .55rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    th { color: var(--muted); font-size: .72rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
    .badge {
      display: inline-flex; align-items: center; padding: .2rem .55rem; border-radius: 999px;
      font-size: .72rem; font-weight: 700; text-transform: uppercase;
      background: rgba(255,255,255,.04); border: 1px solid var(--border); color: var(--muted);
    }
    .badge.user { color: var(--accent2); border-color: rgba(62,224,200,.3); }
    .badge.admin { color: var(--warn); border-color: rgba(245,197,66,.35); }
    .badge.ready, .badge.enabled, .badge.ok { color: var(--ok); border-color: rgba(62,220,156,.35); }
    input, select, textarea {
      background: #0c1220; border: 1px solid var(--border); border-radius: 10px;
      padding: .55rem .7rem; color: var(--text); width: 100%; max-width: 100%;
    }
    .toast {
      position: fixed; right: 1.2rem; bottom: 1.2rem; z-index: 50;
      background: var(--panel-solid); border: 1px solid var(--border);
      padding: .75rem 1rem; border-radius: 12px; opacity: 0; pointer-events: none; transition: .2s;
    }
    .toast.show { opacity: 1; }
    .glass { background: rgba(18, 24, 40, 0.75); border: 1px solid var(--border); backdrop-filter: blur(12px); }
    .bg-orb, .bg-grid { pointer-events: none; position: fixed; inset: 0; z-index: 0; }
    .bg-grid {
      background-image:
        linear-gradient(rgba(120,150,220,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,150,220,.04) 1px, transparent 1px);
      background-size: 48px 48px; opacity: .7;
    }
    .bg-orb { filter: blur(80px); opacity: .35; }
    .orb-a { width: 420px; height: 420px; background: #6b8cff; top: -120px; left: -80px; border-radius: 50%; position: fixed; }
    .orb-b { width: 380px; height: 380px; background: #3ee0c8; bottom: -100px; right: -60px; border-radius: 50%; position: fixed; opacity: .25; }

    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr !important; }
      .sidebar { position: relative; height: auto; margin: .75rem; }
      .nav { flex-direction: row; flex-wrap: wrap; }
      .nav-btn { width: auto; }
    }
  </style>
</head>
<body data-admin="cf-d1" data-build="10">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <div id="login-view">
    <form class="login-card glass" id="login-form">
      <div class="login-logo">
        <div class="logo-mark">T</div>
        <div>
          <div class="logo-title">TTS Control</div>
          <div class="logo-sub">Admin · Cloudflare D1</div>
        </div>
      </div>
      <p class="login-desc">Accounts · proxies · gói ký tự</p>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="Password" required />
      </div>
      <button class="primary btn-block" type="submit">Sign in</button>
      <div class="error" id="login-error"></div>
      <p id="boot-hint" style="color:#8b9bb8;font-size:0.85rem;margin-top:0.75rem">Loading…</p>
    </form>
  </div>

  <div id="app-view" hidden>
    <div class="shell">
      <aside class="sidebar glass">
        <div class="brand">
          <div class="logo-mark sm">T</div>
          <div>
            <div class="brand-name">TTS Control</div>
            <div class="brand-tag">Cloudflare D1</div>
          </div>
        </div>
        <nav class="nav">
          <button type="button" class="nav-btn active" data-page="accounts"><span class="nav-ico">🔑</span> Accounts</button>
          <button type="button" class="nav-btn" data-page="online"><span class="nav-ico">●</span> Online gen</button>
          <button type="button" class="nav-btn" data-page="packages"><span class="nav-ico">▤</span> Gói ký tự</button>
          <button type="button" class="nav-btn" data-page="proxies"><span class="nav-ico">⇄</span> Proxies</button>
          <button type="button" class="nav-btn" data-page="overview"><span class="nav-ico">◈</span> Overview</button>
        </nav>
        <div class="sidebar-foot">
          <div class="pill live" id="live-pill">● D1 live</div>
          <button type="button" class="nav-btn logout" id="btn-logout">Logout</button>
        </div>
      </aside>
      <main class="main">
        <header class="topbar">
          <div>
            <h2 id="page-title">Accounts</h2>
            <p class="muted" id="page-sub">Username/password · gói · max luồng · proxy</p>
          </div>
          <div class="top-actions">
            <span class="chip" id="dash-chip">D1</span>
            <button type="button" class="ghost" id="btn-refresh">Refresh</button>
          </div>
        </header>
        <div id="content"></div>
      </main>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    window.__ttsShowLogin = function () {
      var login = document.getElementById("login-view");
      var app = document.getElementById("app-view");
      if (login) { login.hidden = false; login.style.display = "grid"; login.classList.remove("hidden"); }
      if (app) { app.hidden = true; app.style.display = "none"; app.classList.add("hidden"); }
    };
    window.__ttsShowApp = function () {
      var login = document.getElementById("login-view");
      var app = document.getElementById("app-view");
      if (login) { login.hidden = true; login.style.display = "none"; login.classList.add("hidden"); }
      if (app) { app.hidden = false; app.style.display = "block"; app.classList.remove("hidden"); }
    };
    window.__ttsShowLogin();
    setTimeout(function () {
      var h = document.getElementById("boot-hint");
      if (h) h.textContent = "Enter admin password to continue";
    }, 800);
  </script>
  <script src="/admin/static/app.v6.js?v=11"></script>
</body>
</html>
