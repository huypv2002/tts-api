name = "tts-admin-web"
main = "src/index.js"
compatibility_date = "2024-11-01"
workers_dev = true

# Custom domain admin UI (tunnel still serves /v1/* on same host)
# Also catch legacy /static/admin/* so cached Windows HTML cannot load broken app.js
routes = [
  { pattern = "tts-origin.liveyt.pro/admin*", zone_name = "liveyt.pro" },
  { pattern = "tts-origin.liveyt.pro/static/admin*", zone_name = "liveyt.pro" }
]

[[d1_databases]]
binding = "DB"
database_name = "tts-admin-db"
database_id = "8dc8b8c8-3aab-4d3d-8540-0fc16abf601a"

# API worker first, then static UI
[assets]
directory = "./public"
binding = "ASSETS"
# Worker handles API + path rewrite; Assets store files under public/admin/
run_worker_first = true
html_handling = "none"
not_found_handling = "none"

# Secrets: ADMIN_PASSWORD, API_SECRET
