name = "tts-admin-web"
main = "src/index.js"
compatibility_date = "2024-11-01"

# After: wrangler d1 create tts-admin-db  → paste database_id here
[[d1_databases]]
binding = "DB"
database_name = "tts-admin-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# Serve admin static UI from Worker
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Secrets (set via wrangler secret put):
#   ADMIN_PASSWORD   = 30102002
#   API_SECRET       = random long string for future tool API
