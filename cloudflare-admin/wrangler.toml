name = "tts-admin-web"
main = "src/index.js"
compatibility_date = "2024-11-01"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "tts-admin-db"
database_id = "8dc8b8c8-3aab-4d3d-8540-0fc16abf601a"

# API worker first, then static UI
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]
not_found_handling = "single-page-application"

# Secrets: ADMIN_PASSWORD, API_SECRET
