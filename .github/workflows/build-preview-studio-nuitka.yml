name: Build TTS Studio Nuitka

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-windows-nuitka:
    name: Build Nuitka onefile Windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-preview-nuitka-py311-${{ hashFiles('preview_studio/requirements.txt') }}
          restore-keys: pip-win-preview-nuitka-py311-

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r preview_studio/requirements.txt nuitka ordered-set zstandard PyJWT

      - name: Verify critical imports
        shell: pwsh
        run: |
          $env:PYTHONPATH = (Resolve-Path ".").Path
          python -c @"
          import sys
          mods = [
              'PySide6', 'PySide6.QtWidgets', 'httpx', 'tls_client',
              'camoufox', 'camoufox.async_api', 'playwright', 'browserforge',
              'apify_fingerprint_datapoints', 'numpy', 'platformdirs', 'jwt', 'fast_tts',
          ]
          from apify_fingerprint_datapoints import get_input_network
          p = get_input_network()
          assert p.is_file(), p
          print('  OK datapoint', p)
          err = []
          for m in mods:
              try:
                  __import__(m)
                  print('  OK', m)
              except Exception as e:
                  print('  FAIL', m, e)
                  err.append(m)
          if err:
              sys.exit(1)
          from camoufox.async_api import AsyncCamoufox
          print('  OK AsyncCamoufox', AsyncCamoufox)
          print('imports ok')
          "@

      # Browser Camoufox (~300–700MB) — gói cạnh EXE để user double-click là chạy
      - name: Fetch Camoufox browser (Windows)
        shell: pwsh
        run: |
          $env:PYTHONPATH = (Resolve-Path ".").Path
          python -m camoufox fetch
          python -c @"
          from camoufox.pkgman import INSTALL_DIR, launch_path
          from pathlib import Path
          p = Path(INSTALL_DIR)
          print('INSTALL_DIR', p)
          assert p.is_dir() and any(p.iterdir()), 'camoufox install empty'
          print('launch', launch_path())
          n = sum(1 for _ in p.rglob('*') if _.is_file())
          sz = sum(f.stat().st_size for f in p.rglob('*') if f.is_file())
          print(f'files={n} size_mb={sz/1e6:.1f}')
          "@

      # ffmpeg static essentials — merge MP3 không cần cài PATH hệ thống
      - name: Download portable ffmpeg (Windows)
        shell: pwsh
        run: |
          $dest = "preview_studio\portable-runtime"
          New-Item -ItemType Directory -Force -Path "$dest\bin" | Out-Null
          $zip = "$env:RUNNER_TEMP\ffmpeg-essentials.zip"
          $urls = @(
            "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip",
            "https://github.com/GyanD/codexffmpeg/releases/download/7.1/ffmpeg-7.1-essentials_build.zip"
          )
          $ok = $false
          foreach ($u in $urls) {
            try {
              Write-Host "Download $u"
              Invoke-WebRequest -Uri $u -OutFile $zip -UseBasicParsing
              $ok = $true
              break
            } catch {
              Write-Host "fail: $_"
            }
          }
          if (-not $ok) { throw "cannot download ffmpeg" }
          $extract = "$env:RUNNER_TEMP\ffmpeg-extract"
          if (Test-Path $extract) { Remove-Item $extract -Recurse -Force }
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          $ff = Get-ChildItem -Path $extract -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $fp = Get-ChildItem -Path $extract -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          if (-not $ff) { throw "ffmpeg.exe not found in zip" }
          Copy-Item $ff.FullName "$dest\bin\ffmpeg.exe" -Force
          if ($fp) { Copy-Item $fp.FullName "$dest\bin\ffprobe.exe" -Force }
          & "$dest\bin\ffmpeg.exe" -version | Select-Object -First 1
          Write-Host "ffmpeg ready at $dest\bin"

      - name: Prepare CPU count
        id: pkg
        shell: pwsh
        run: |
          $cpu = $env:NUMBER_OF_PROCESSORS
          if (-not $cpu) { $cpu = "4" }
          echo "CPU_COUNT=$cpu" >> $env:GITHUB_OUTPUT

      # Standalone (folder) ổn định hơn onefile: Qt plugins cạnh EXE, mở nhanh, không extract TEMP
      - name: Build with Nuitka standalone
        shell: pwsh
        run: |
          $cpu = "${{ steps.pkg.outputs.CPU_COUNT }}"
          $env:PYTHONPATH = (Resolve-Path ".").Path
          New-Item -ItemType Directory -Force -Path preview_studio\dist-nuitka | Out-Null
          python -m nuitka `
            --standalone `
            --assume-yes-for-downloads `
            --enable-plugin=pyside6 `
            --windows-console-mode=force `
            --force-stderr-spec="{PROGRAM_DIR}/studio_stderr.txt" `
            --force-stdout-spec="{PROGRAM_DIR}/studio_stdout.txt" `
            --include-qt-plugins=sensible,styles,platforms,iconengines,imageformats,tls,generic `
            --output-dir=preview_studio\dist-nuitka `
            --output-filename="TTSStudio.exe" `
            --include-module=fast_tts `
            --include-module=app_paths `
            --include-module=accounts_store `
            --include-module=local_tts `
            --include-module=gen_pipeline `
            --include-module=output_layout `
            --include-module=ffmpeg_tools `
            --include-module=multivoice `
            --include-package=ui `
            --include-package=camoufox `
            --include-package=playwright `
            --include-package=browserforge `
            --include-package=apify_fingerprint_datapoints `
            --include-package=language_tags `
            --include-package=ua_parser `
            --include-package=screeninfo `
            --include-package=platformdirs `
            --include-package=tls_client `
            --include-package-data=certifi `
            --include-package-data=camoufox `
            --include-package-data=playwright `
            --include-package-data=browserforge `
            --include-package-data=apify_fingerprint_datapoints `
            --include-package-data=language_tags `
            --include-package-data=tls_client `
            --include-data-files=preview_studio\silent_1s.mp3=silent_1s.mp3 `
            --include-data-files=preview_studio\silent_1_5s.mp3=silent_1_5s.mp3 `
            --include-data-files=preview_studio\silent_05s.mp3=silent_05s.mp3 `
            --nofollow-import-to=tkinter `
            --nofollow-import-to=_tkinter `
            --nofollow-import-to=matplotlib `
            --nofollow-import-to=pandas `
            --nofollow-import-to=scipy `
            --nofollow-import-to=IPython `
            --nofollow-import-to=jupyter `
            --nofollow-import-to=PyQt5 `
            --nofollow-import-to=PyQt6 `
            --nofollow-import-to=PySide2 `
            --jobs=$cpu `
            --lto=no `
            preview_studio\PreviewStudio.py

      # Copy ALL camoufox-related package data (json/zip/mmdb/driver) into dist
      # so one build catches language_tags + apify + camoufox + playwright data.
      - name: Ensure package data in dist (comprehensive)
        shell: pwsh
        run: |
          $distDir = Get-ChildItem -Path "preview_studio\dist-nuitka" -Directory -Filter "*.dist" | Select-Object -First 1
          if (-not $distDir) { throw "no *.dist" }
          Write-Host "Ensuring package data in $($distDir.FullName)"
          python preview_studio/ci_ensure_package_data.py "$($distDir.FullName)"
          if ($LASTEXITCODE -ne 0) { throw "package data ensure failed" }

      # Smoke: run frozen EXE import path via short Python check of required files
      # + try loading language_tags/apify from dist paths
      - name: Smoke required data files
        shell: pwsh
        run: |
          $distDir = Get-ChildItem -Path "preview_studio\dist-nuitka" -Directory -Filter "*.dist" | Select-Object -First 1
          # Bắt buộc — thiếu = app không import được camoufox
          $required = @(
            "language_tags\data\json\index.json",
            "language_tags\data\json\registry.json",
            "apify_fingerprint_datapoints\data\input-network-definition.zip",
            "camoufox\browserforge.yml",
            "camoufox\fonts.json",
            "browserforge\injectors\data\utils.js.xz",
            "certifi\cacert.pem"
          )
          # Optional: GeoLite2 (geoip extra), playwright driver node, tls dll
          $optional = @(
            "camoufox\GeoLite2-City.mmdb",
            "camoufox\webgl\webgl_data.db",
            "playwright\driver\package\api.json",
            "tls_client\dependencies\tls-client-64.dll"
          )
          foreach ($rel in $required) {
            $p = Join-Path $distDir.FullName $rel
            if (-not (Test-Path $p)) { throw "SMOKE MISSING $rel" }
            Write-Host "SMOKE OK $rel ($([math]::Round((Get-Item $p).Length/1KB,1)) KB)"
          }
          foreach ($rel in $optional) {
            $p = Join-Path $distDir.FullName $rel
            if (Test-Path $p) {
              Write-Host "SMOKE OPT-OK $rel ($([math]::Round((Get-Item $p).Length/1KB,1)) KB)"
            } else {
              Write-Host "SMOKE OPT-SKIP $rel"
            }
          }

      - name: Assemble portable release + ZIP
        shell: pwsh
        run: |
          $dist = "preview_studio\dist-nuitka"
          # Nuitka standalone → PreviewStudio.dist\ (or TTSStudio.dist)
          $distDir = Get-ChildItem -Path $dist -Directory -Filter "*.dist" | Select-Object -First 1
          if (-not $distDir) {
            Write-Host "No *.dist folder, listing:"
            Get-ChildItem -Recurse $dist -Filter "*.exe" | ForEach-Object { $_.FullName }
            throw "Nuitka standalone dist folder missing"
          }
          Write-Host "Nuitka dist: $($distDir.FullName)"
          $exe = Get-ChildItem -Path $distDir.FullName -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "no exe in dist" }
          Write-Host "Main exe: $($exe.FullName) size=$([math]::Round($exe.Length/1MB,1)) MB"

          $release = Join-Path $dist "TTS-Studio-Nuitka"
          if (Test-Path $release) { Remove-Item $release -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $release | Out-Null

          # Copy entire standalone tree (EXE + Qt/python DLLs)
          Copy-Item -Path (Join-Path $distDir.FullName "*") -Destination $release -Recurse -Force

          # Rename main exe to friendly name if needed
          $mainExe = Join-Path $release $exe.Name
          $friendly = Join-Path $release "TTS Studio.exe"
          if ((Test-Path $mainExe) -and ($exe.Name -ne "TTS Studio.exe")) {
            if (Test-Path $friendly) { Remove-Item $friendly -Force }
            Rename-Item $mainExe "TTS Studio.exe"
          }

          New-Item -ItemType Directory -Force -Path "$release\bin" | Out-Null
          New-Item -ItemType Directory -Force -Path "$release\camoufox-browser" | Out-Null

          Copy-Item preview_studio\silent_1s.mp3 $release -ErrorAction SilentlyContinue
          Copy-Item preview_studio\silent_1_5s.mp3 $release -ErrorAction SilentlyContinue
          Copy-Item preview_studio\silent_05s.mp3 $release -ErrorAction SilentlyContinue
          Copy-Item proxyxoay.example.json $release -ErrorAction SilentlyContinue

          # ffmpeg portable
          $ffSrc = "preview_studio\portable-runtime\bin"
          if (Test-Path "$ffSrc\ffmpeg.exe") {
            Copy-Item "$ffSrc\*" "$release\bin\" -Force
            Write-Host "bundled ffmpeg ok"
          } else {
            throw "missing portable ffmpeg at $ffSrc"
          }

          # camoufox browser
          $fox = python -c "from camoufox.pkgman import INSTALL_DIR; print(INSTALL_DIR)"
          $fox = $fox.Trim()
          if (-not (Test-Path $fox)) { throw "camoufox INSTALL_DIR missing: $fox" }
          Write-Host "Copy camoufox from $fox"
          Copy-Item -Path (Join-Path $fox "*") -Destination "$release\camoufox-browser\" -Recurse -Force
          $n = (Get-ChildItem "$release\camoufox-browser" -Recurse -File | Measure-Object).Count
          if ($n -lt 5) { throw "camoufox-browser too small ($n files)" }
          Write-Host "camoufox-browser files=$n"

          # Launcher: cd to folder then run (fix working directory)
          @"
          @echo off
          cd /d "%~dp0"
          echo [CHAY-STUDIO] folder=%cd%
          if exist "TTS Studio.exe" (
            "TTS Studio.exe"
          ) else if exist "TTSStudio.exe" (
            "TTSStudio.exe"
          ) else if exist "PreviewStudio.exe" (
            "PreviewStudio.exe"
          ) else (
            echo EXE not found in %~dp0
            dir /b *.exe
          )
          echo.
          echo Neu app tat ngay: mo studio_boot.log / studio_stderr.txt
          echo TEMP log: %TEMP%\tts_studio_boot.log
          pause
          "@ | Set-Content -Encoding ascii (Join-Path $release "CHAY-STUDIO.bat")

          @"
          @echo off
          cd /d "%~dp0"
          echo ==== DEBUG RUN ====
          echo folder=%cd%
          dir /b *.exe
          echo.
          if exist "TTS Studio.exe" ( "TTS Studio.exe" ) else if exist "TTSStudio.exe" ( "TTSStudio.exe" ) else ( "PreviewStudio.exe" )
          echo exitcode=%ERRORLEVEL%
          echo.
          echo ---- studio_boot.log ----
          if exist studio_boot.log ( type studio_boot.log ) else ( echo (chua co studio_boot.log canh EXE) )
          echo.
          echo ---- studio_stderr.txt ----
          if exist studio_stderr.txt ( type studio_stderr.txt ) else ( echo (chua co) )
          echo.
          echo ---- TEMP tts_studio_boot.log ----
          if exist "%TEMP%\tts_studio_boot.log" ( type "%TEMP%\tts_studio_boot.log" ) else ( echo (chua co) )
          echo.
          pause
          "@ | Set-Content -Encoding ascii (Join-Path $release "CHAY-DEBUG.bat")

          @"
          TTS Studio — Portable (Windows)
          ================================
          1) Giải nén CẢ THƯ MỤC
          2) Chạy CHAY-STUDIO.bat  (hoặc TTS Studio.exe / TTSStudio.exe)
          3) Nếu không lên app → chạy CHAY-DEBUG.bat và chụp màn hình console

          LOG LỖI (theo thứ tự tìm):
            A) Cùng thư mục EXE:
                 studio_boot.log
                 studio_stderr.txt
                 studio_stdout.txt
                 preview_studio_crash.log
            B) %TEMP%\tts_studio_boot.log
               (thường: C:\Users\<ban>\AppData\Local\Temp\tts_studio_boot.log)
            C) Desktop\tts_studio_boot.log

          Có sẵn: Qt/DLL, bin\ffmpeg.exe, camoufox-browser\
          "@ | Set-Content -Encoding utf8 (Join-Path $release "HUONG_DAN.txt")

          $zip = "preview_studio\TTS-Studio-Nuitka-windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory(
            (Resolve-Path $release).Path,
            (Join-Path (Resolve-Path "preview_studio").Path "TTS-Studio-Nuitka-windows.zip"),
            [System.IO.Compression.CompressionLevel]::Optimal,
            $true
          )
          $sizeMB = [math]::Round((Get-Item $zip).Length / 1MB, 2)
          Write-Host "ZIP: $zip ($sizeMB MB) — standalone portable"

      # Artifacts often hit free-tier storage quota; keep as best-effort only.
      - name: Upload artifact (best-effort)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: TTS-Studio-Nuitka-windows
          path: preview_studio/TTS-Studio-Nuitka-windows.zip
          if-no-files-found: error
          retention-days: 7

      # Primary deliverable: rolling prerelease (does not use Actions artifact quota)
      - name: Publish rolling GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tts-studio-windows-latest
          name: TTS Studio Windows (Nuitka latest)
          body: |
            **Portable full** — giải nén cả folder, double-click `TTS Studio.exe`.
            Kèm sẵn: Camoufox browser + ffmpeg (không cần cài thêm).
            Download `TTS-Studio-Nuitka-windows.zip` (~300–800MB vì có browser).
          files: preview_studio/TTS-Studio-Nuitka-windows.zip
          draft: false
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: preview_studio/TTS-Studio-Nuitka-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}